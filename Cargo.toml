[package]
name = "observe"
version = "0.1.0"
authors = ["Stanislav Panferov <stanislav@panferov.dev>"]
edition = "2018"

[dependencies]
observe-macro = { version="0.1.0", path="./macros" }
tracing= "^0.1.13"
futures = { version = "^0.3.4", optional = true }
wasm-bindgen-futures = { version = "^0.4.9", optional = true }
fxhash="^0.2.1"
snowflake="^1.3.0"
parking_lot="^0.10.2"
enclose="^1.1.8"

[features]
default=[]
full=["tokio-0", "wasm-bindgen-futures-0"]
futures-03=["futures"]
tokio-0 = ["tokio", "futures-03"]
wasm-bindgen-futures-0 = ["wasm-bindgen-futures", "futures-03"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "0.2.20", optional = true, features = ["rt-core", "rt-util", "rt-threaded", "macros", "time"] }

[dev-dependencies]
mockall= "0.7.1"
tracing-subscriber= "0.2.5"

[[test]]
name = "tests"
path = "tests/main.rs"