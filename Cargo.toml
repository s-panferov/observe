[package]
name = "observe"
version = "0.1.0"
authors = ["Stanislav Panferov <stanislav.panferov@revjet.com>"]
edition = "2018"

[dependencies]
tracing= "0.1.13"
futures = { version = "0.3.4", optional = true }
wasm-bindgen-futures = { version = "0.4.9", optional = true }
fxhash="*"
snowflake="*"
parking_lot="*"
enclose="*"

[features]
default=[]
full=["tokio-0", "wasm-bindgen-futures-0"]
futures-03=["futures"]
tokio-0 = ["tokio", "futures-03"]
wasm-bindgen-futures-0 = ["wasm-bindgen-futures", "futures-03"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "0.2.20", optional = true, features = ["rt-core", "rt-util", "rt-threaded", "macros", "time"] }

[dev-dependencies]
mockall= "0.7.1"
tracing-subscriber= "0.2.5"

[[test]]
name = "tests"
path = "tests/main.rs"