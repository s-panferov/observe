[package]
name = "observe-macro"
version = "0.1.0"
authors = ["Stanislav Panferov <stanislav@panferov.dev>"]
edition = "2018"
license = "MIT"
description = "Implements observe decorators"
homepage = "https://github.com/spanferov/observe"
repository = "https://github.com/spanferov/observe"

[dependencies]
syn = { version = "1.0.44", features = ["full", "extra-traits"] }
quote = "1.0.7"
proc-macro2 = "1.0.24"
proc-macro-hack = "0.5.18"
darling = "0.10.2"

# [dev-dependencies]
# observe = { version = "^0.1.0", path = "../observe" }

[lib]
proc-macro = true
